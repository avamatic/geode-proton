name: _job_build

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string

jobs:
  optiscaler:
    name: Build OptiScaler Runtime
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: false

      - name: Init OptiScaler submodule
        shell: bash
        run: |
          git submodule update --init --recursive optiscaler

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build OptiScaler (Release x64)
        run: |
          msbuild optiscaler/OptiScaler.sln /m /p:Configuration=Release /p:Platform=x64 /verbosity:minimal

      - name: Upload OptiScaler runtime artifact
        uses: actions/upload-artifact@v5
        with:
          name: optiscaler-runtime
          path: optiscaler/x64/Release/a/**
          compression-level: 0
          if-no-files-found: error

  proton:
    name: Build ${{ inputs.name }}
    needs: optiscaler
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup disk space
        uses: endersonmenezes/free-disk-space@v3
        with:
          remove_android: true
          remove_dotnet: true
          remove_haskell: true
          remove_tool_cache: true
          remove_codeql: true
          remove_docker_images: true
          remove_swap: true
          remove_packages: |
            azure-cli google-cloud-cli google-chrome-stable firefox microsoft-edge-stable
            postgresql* mysql* php* temurin-* *llvm* clang* mono-devel powershell dotnet-sdk-*
          remove_folders: |
            /usr/share/swift /usr/share/miniconda /usr/local/lib/node_modules
            /usr/local/share/chromium /usr/local/share/powershell /usr/local/julia*
            /usr/local/aws-cli /usr/local/aws-sam-cli /usr/share/gradle /usr/share/az*
            /usr/local/.ghcup

      - name: Prepare host
        run: sudo apt update && sudo apt-get install -y ccache fontforge-nox

      - name: Restore cache
        id: ccache-restore
        uses: actions/cache/restore@v4
        with:
          path: ~/.ccache
          key: ccache-proton-${{ github.run_id }}
          restore-keys: |
            ccache-proton

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: false

      - name: Patch
        run: |
          git submodule update --init --filter=tree:0 --recursive
          # apply proton-ge-custom patches
          ./patches/protonprep-valve-staging.sh || true
          # strip binaries at compile time to save space in the runner
          patch -Np1 -i ./.github/patches/0001-build-strip-binaries-early.patch
          mkdir ./build

      - name: Download OptiScaler runtime artifact
        uses: actions/download-artifact@v6
        with:
          name: optiscaler-runtime
          path: ./build/optiscaler-runtime

      - name: Resolve OptiScaler runtime path
        id: optiscaler-runtime
        shell: bash
        run: |
          runtime_dll="$(find ./build/optiscaler-runtime -type f -name OptiScaler.dll -print -quit)"
          if [ -z "$runtime_dll" ]; then
            echo "OptiScaler.dll not found in downloaded artifact."
            exit 1
          fi
          runtime_dir="$(realpath "$(dirname "$runtime_dll")")"
          if [ ! -f "$runtime_dir/OptiScaler.ini" ]; then
            echo "OptiScaler.ini not found next to OptiScaler.dll in artifact payload."
            exit 1
          fi
          echo "path=$runtime_dir" >> "$GITHUB_OUTPUT"

      - name: Configure
        working-directory: ./build
        run: |
          ../configure.sh --build-name=${{ inputs.name }} --container-engine=docker

      - name: Make ${{ inputs.name }}
        working-directory: ./build
        run: |
          make -j$(nproc) OPTISCALER_RUNTIME_DIR="${{ steps.optiscaler-runtime.outputs.path }}" redist

      - name: Save cache
        id: ccache-save
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.ccache
          key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

      - name: Upload artifact ${{ inputs.name }}.tar.gz
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.name }}.tar.gz
          path: ./build/${{ inputs.name }}.tar.gz

      - name: Upload artifact ${{ inputs.name }}.sha512sum
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.name }}.sha512sum
          path: ./build/${{ inputs.name }}.sha512sum
