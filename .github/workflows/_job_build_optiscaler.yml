name: _job_build_optiscaler

on:
  workflow_call:

jobs:
  optiscaler:
    name: Package OptiScaler
    runs-on: ubuntu-latest

    steps:
      - name: Download OptiScaler edge build
        run: |
          # Get the latest edge tag from OptiScaler-builds
          TAGS_JSON=$(curl -sf https://api.github.com/repos/benjamimgois/OptiScaler-builds/tags)
          EDGE_TAG=$(echo "$TAGS_JSON" | jq -r '[.[] | select(.name | startswith("edge-"))][0].name')
          if [ -z "$EDGE_TAG" ] || [ "$EDGE_TAG" = "null" ]; then
            echo "Error: Could not find edge tag"
            exit 1
          fi
          echo "Found edge tag: $EDGE_TAG"
          echo "EDGE_TAG=$EDGE_TAG" >> $GITHUB_ENV

          DOWNLOAD_URL="https://github.com/benjamimgois/OptiScaler-builds/releases/download/${EDGE_TAG}/optiscaler-edge.7z"
          echo "Downloading from: $DOWNLOAD_URL"
          curl -sfL -o optiscaler-edge.7z "$DOWNLOAD_URL"

      - name: Extract and repackage
        run: |
          sudo apt-get install -y p7zip-full

          mkdir -p extracted
          7z x -oextracted optiscaler-edge.7z

          echo "Extracted contents:"
          find extracted -type f | sort

          # Repackage into our distribution layout
          DIST="optiscaler-dist"
          WINDIR="$DIST/x86_64-windows"
          PLUGINS="$WINDIR/plugins"

          mkdir -p "$WINDIR" "$PLUGINS" "$DIST/Licenses"

          # Core DLL
          cp extracted/OptiScaler.dll "$WINDIR/"

          # Config
          cp extracted/OptiScaler.ini "$DIST/"

          # Supporting DLLs
          for dll in \
            amd_fidelityfx_dx12.dll \
            amd_fidelityfx_upscaler_dx12.dll \
            amd_fidelityfx_framegeneration_dx12.dll \
            amd_fidelityfx_vk.dll \
            libxess.dll \
            libxess_dx11.dll \
            libxess_fg.dll \
            libxell.dll \
            dlssg_to_fsr3_amd_is_better.dll \
          ; do
            if [ -f "extracted/$dll" ]; then
              cp "extracted/$dll" "$WINDIR/"
              echo "Copied: $dll"
            else
              echo "Warning: $dll not found in archive"
            fi
          done

          # OptiPatcher plugin (may have version suffix)
          OPTIPATCHER=$(find extracted/plugins -name "OptiPatcher*.asi" 2>/dev/null | head -1)
          if [ -n "$OPTIPATCHER" ]; then
            cp "$OPTIPATCHER" "$PLUGINS/OptiPatcher.asi"
            echo "Copied OptiPatcher: $OPTIPATCHER"
          else
            echo "Warning: OptiPatcher.asi not found"
          fi

          # Licenses
          if [ -d "extracted/Licenses" ]; then
            cp -r extracted/Licenses/* "$DIST/Licenses/" 2>/dev/null || true
          fi

          # Version tracking
          echo "OptiScaler ${EDGE_TAG}" > "$DIST/version"

          # Create tarball
          tar -czf optiscaler-dist.tar.gz -C "$DIST" .

          echo ""
          echo "Distribution packaged successfully:"
          find "$DIST" -type f | sort

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: optiscaler-dist.tar.gz
          path: optiscaler-dist.tar.gz
          if-no-files-found: error
