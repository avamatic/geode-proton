name: _job_build_optiscaler

on:
  workflow_call:

jobs:
  optiscaler:
    name: Build OptiScaler
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false

      - name: Initialize OptiScaler submodule
        shell: bash
        run: |
          git submodule update --init --recursive OptiScaler
          git submodule update --init --recursive OptiPatcher

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build OptiScaler
        shell: cmd
        run: msbuild /m /p:Configuration=Release OptiScaler\OptiScaler.sln /verbosity:minimal

      - name: Build OptiPatcher
        shell: cmd
        run: msbuild /m /p:Configuration=Release OptiPatcher\OptiPatcher.sln /verbosity:minimal

      - name: Download dlssg-to-fsr3
        shell: pwsh
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/Nukem9/dlssg-to-fsr3/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match '\.zip$' } | Select-Object -First 1
          if (-not $asset) {
            Write-Error "No zip asset found in dlssg-to-fsr3 latest release"
            exit 1
          }
          Write-Output "Downloading $($asset.name) from $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "dlssg-to-fsr3.zip"
          Expand-Archive -Path "dlssg-to-fsr3.zip" -DestinationPath "dlssg-to-fsr3-extracted"
          # Find the DLL in the extracted archive
          $dll = Get-ChildItem -Path "dlssg-to-fsr3-extracted" -Recurse -Filter "dlssg_to_fsr3_amd_is_better.dll" | Select-Object -First 1
          if (-not $dll) {
            Write-Error "dlssg_to_fsr3_amd_is_better.dll not found in archive"
            exit 1
          }
          Copy-Item $dll.FullName -Destination "dlssg_to_fsr3_amd_is_better.dll"
          Write-Output "dlssg_to_fsr3_amd_is_better.dll extracted successfully"

      - name: Package OptiScaler distribution
        shell: pwsh
        run: |
          $dist = "optiscaler-dist"
          $windir = "$dist/x86_64-windows"
          $plugins = "$windir/plugins"

          New-Item -ItemType Directory -Force -Path $windir
          New-Item -ItemType Directory -Force -Path $plugins
          New-Item -ItemType Directory -Force -Path "$dist/Licenses"

          # OptiScaler.dll and config (from post-build output)
          Copy-Item "OptiScaler/x64/Release/a/OptiScaler.dll" -Destination $windir
          Copy-Item "OptiScaler/x64/Release/a/OptiScaler.ini" -Destination $dist

          # Supporting DLLs from OptiScaler build output
          $supportDlls = @(
            "libxess.dll",
            "libxess_dx11.dll",
            "libxess_fg.dll",
            "libxell.dll",
            "amd_fidelityfx_dx12.dll",
            "amd_fidelityfx_upscaler_dx12.dll",
            "amd_fidelityfx_framegeneration_dx12.dll",
            "amd_fidelityfx_vk.dll"
          )
          foreach ($dll in $supportDlls) {
            $src = "OptiScaler/x64/Release/a/$dll"
            if (Test-Path $src) {
              Copy-Item $src -Destination $windir
            } else {
              Write-Warning "Supporting DLL not found: $dll"
            }
          }

          # Nukem FG mod
          Copy-Item "dlssg_to_fsr3_amd_is_better.dll" -Destination $windir

          # OptiPatcher
          Copy-Item "OptiPatcher/x64/Release/OptiPatcher.asi" -Destination $plugins

          # Licenses
          if (Test-Path "OptiScaler/x64/Release/a/Licenses") {
            Copy-Item "OptiScaler/x64/Release/a/Licenses/*" -Destination "$dist/Licenses" -Recurse
          }

          # Version tracking
          $commit = git -C OptiScaler rev-parse --short HEAD
          $version = "OptiScaler $commit"
          Set-Content -Path "$dist/version" -Value $version

          # Create tarball
          tar -czf optiscaler-dist.tar.gz -C $dist .

          Write-Output "Distribution packaged successfully"
          Get-ChildItem -Recurse $dist | ForEach-Object { Write-Output $_.FullName }

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: optiscaler-dist.tar.gz
          path: optiscaler-dist.tar.gz
          if-no-files-found: error
